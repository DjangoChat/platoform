version: "3.8"

services:
  stripe-cli:
    build:
      context: .
      dockerfile: ./services/docker/stripe/development/Dockerfile
    volumes:
      - stripe-config:/root/.config/stripe/
      - stripe-secrets:/stripe-secrets
    networks:
      - platoform_net
    env_file:
      - .env.development

  # sonarqube:
  #   image: sonarqube:lts-community
  #   ports:
  #     - "9000:9000"
  #   environment:
  #     SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
  #     SONAR_JDBC_USERNAME: admin
  #     SONAR_JDBC_PASSWORD: admin
  #   volumes:
  #     - sonarqube_data:/opt/sonarqube/data
  #     - sonarqube_logs:/opt/sonarqube/logs
  #     - sonarqube_extensions:/opt/sonarqube/extensions
  #   networks:
  #     - platoform_net

  web:
    volumes:
      - static_volume:/app/backend/src/mediafields
      - ./services/backend/htmlcov:/app/backend/htmlcov
      - stripe-secrets:/stripe-secrets
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      stripe-cli:
        condition: service_started

  redis:
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  frontend:
    volumes:
      - ./services/frontend/src:/app/frontend/src
    ports:
      - "5173:80"

  db:
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  stripe-config: {}
  stripe-secrets: {}
  sonarqube_data: {}
  sonarqube_logs: {}
  sonarqube_extensions: {}
