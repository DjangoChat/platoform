version: "3.8"

services:
  stripe-cli:
    build:
      context: .
      dockerfile: ./services/docker/stripe/development/Dockerfile
    volumes:
      - stripe-config:/root/.config/stripe/
      - stripe-secrets:/stripe-secrets
    networks:
      - platoform_net
    env_file:
      - .env.development

  web:
    container_name: platoform_django
    build:
      context: .
      dockerfile: ./services/docker/django/development/Dockerfile
    env_file:
      - .env.development
    networks:
      - platoform_net
    depends_on:
      - stripe-cli
      - db

  frontend:
    container_name: platoform_react
    build:
      context: .
      dockerfile: ./services/docker/react/development/Dockerfile
    env_file:
      - .env.development
    networks:
      - platoform_net
    depends_on:
      - web

  db:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    env_file:
      - .env.development
    networks:
      - platoform_net

volumes:
  static_volume: {}
  postgres_data: {}
  stripe-config: {}
  stripe-secrets: {}

networks:
  platoform_net:
