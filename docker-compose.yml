version: "3.8"

services:
  web:
    container_name: platoform_django
    build:
      context: .
      dockerfile: ./services/docker/django/development/Dockerfile
    env_file:
      - .env.development
    networks:
      - platoform_net
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: platoform_react
    build:
      context: .
      dockerfile: ./services/docker/react/development/Dockerfile
    env_file:
      - .env.development
    networks:
      - platoform_net
    depends_on:
      - web

  db:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    env_file:
      - .env.development
    networks:
      - platoform_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7
    container_name: platform_redis
    restart: unless-stopped
    networks:
      - platoform_net

  # ollama:
  #   image: ollama/ollama
  #   container_name: platform_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  static_volume: {}
  postgres_data: {}
  ollama_data: {}
  redis_data: {}

networks:
  platoform_net:
